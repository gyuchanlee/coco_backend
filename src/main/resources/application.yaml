spring:
  application:
    name: cocoBackend
  autoconfigure:
    exclude: org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:mariadb://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # @Column(name=) 명시한 컬럼명을 snake_case로 자동변환하지 않도록 설정 >> DB 컬럼명이 스네이크가 아님
        physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  mybatis:
    mapper-locations: classpath:mapper/**/*.xml
    type-aliases-package: com.eodegano.cocoBackend.domain
    configuration:
      map-underscore-to-camel-case: true

# 한국관광공사 TourAPI v2
tourapi:
  service-key: ${TOURAPI_SERVICE_KEY}

# JWT
jwt:
  secret: ${JWT_SECRET}           # 256bit 이상 랜덤 문자열 (환경변수)
  access-token-expiry: 900000     # 15분 (ms)
  refresh-token-expiry: 604800000 # 7일 (ms)
